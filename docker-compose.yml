services:
  postgres:
    image: postgis/postgis:15-3.3
    container_name: asterra-postgres
    environment:
      POSTGRES_DB: asterra_db
      POSTGRES_USER: asterra_user
      POSTGRES_PASSWORD: localstack_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    image: asterra-processor:latest
    container_name: asterra-app
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: asterra_db
      DB_USER: asterra_user
      DB_PASSWORD: localstack_pass
      S3_ENDPOINT: http://host.docker.internal:4566
      AWS_REGION: us-east-1
    ports:
      - "5000:5000"
    depends_on:
      - postgres

  wordpress:
    image: wordpress:latest
    container_name: asterra-wordpress
    environment:
      WORDPRESS_DB_HOST: mysql
      WORDPRESS_DB_USER: wp_user
      WORDPRESS_DB_PASSWORD: wp_pass
      WORDPRESS_DB_NAME: wp_db
    ports:
      - "8080:80"
    depends_on:
      - mysql

  mysql:
    image: mysql:8.0
    container_name: asterra-mysql
    environment:
      MYSQL_DATABASE: wp_db
      MYSQL_USER: wp_user
      MYSQL_PASSWORD: wp_pass
      MYSQL_ROOT_PASSWORD: root_pass
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  postgres_data:
  mysql_data:
